; PlatformIO Configuration — Blue Pill + DM542 Motor Controller
; See PIN_SETUP.md for complete wiring documentation.

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = arduino
upload_protocol = stlink
monitor_speed = 115200

; Use USART1 (PA9 TX / PA10 RX) for serial communication with the Pi.
; Serial1 is the default USART1 on STM32duino.
;
; If you also want USB serial for debugging while developing,
; uncomment the line below to enable both USB CDC and USART1:
; build_flags = -D USBCON -D HAL_PCD_MODULE_ENABLED
